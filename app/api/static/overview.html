<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Обзор ML-мониторинга</title>
    <style>
      :root {
        --bg: #f4efe5;
        --panel: rgba(255, 252, 246, 0.88);
        --panel-strong: rgba(255, 250, 242, 0.96);
        --text: #1f1b17;
        --muted: #675d52;
        --line: rgba(52, 42, 31, 0.12);
        --accent: #c55b2f;
        --accent-soft: rgba(197, 91, 47, 0.12);
        --ok: #1f7a4c;
        --warn: #b54724;
        --shadow: 0 24px 60px rgba(40, 26, 17, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(197, 91, 47, 0.18), transparent 32%),
          radial-gradient(circle at top right, rgba(34, 112, 86, 0.18), transparent 28%),
          linear-gradient(180deg, #efe4d4 0%, #f4efe5 42%, #efe7dd 100%);
      }

      .shell {
        width: min(1200px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.3fr 0.7fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .hero-card {
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        font-size: clamp(36px, 5vw, 64px);
        line-height: 0.95;
        letter-spacing: -0.04em;
      }

      .subtitle {
        max-width: 58ch;
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border-radius: 999px;
        padding: 12px 16px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        font-weight: 700;
      }

      .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--ok);
        box-shadow: 0 0 0 8px rgba(31, 122, 76, 0.12);
      }

      .status-dot.attention {
        background: var(--warn);
        box-shadow: 0 0 0 8px rgba(181, 71, 36, 0.12);
      }

      .hero-meta {
        display: grid;
        gap: 12px;
        align-content: start;
      }

      .mini-list {
        display: grid;
        gap: 12px;
      }

      .mini-item {
        padding: 18px;
        border-radius: 18px;
        background: var(--panel-strong);
        border: 1px solid var(--line);
      }

      .mini-item span {
        display: block;
      }

      .mini-item .label {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .mini-item .value {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .links a {
        color: var(--text);
        text-decoration: none;
        border-radius: 999px;
        padding: 10px 14px;
        background: rgba(255, 255, 255, 0.6);
        border: 1px solid var(--line);
        transition: transform 120ms ease, background 120ms ease;
      }

      .links a:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.92);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 20px;
      }

      .card {
        grid-column: span 3;
        padding: 22px;
      }

      .card .label {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .card .value {
        margin-top: 14px;
        font-size: clamp(28px, 3vw, 44px);
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .card .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .wide {
        grid-column: span 6;
        padding: 24px;
      }

      .section-title {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: baseline;
        margin-bottom: 18px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 22px;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        letter-spacing: -0.03em;
      }

      .section-title span {
        color: var(--muted);
        font-size: 13px;
      }

      .run-box {
        display: grid;
        gap: 16px;
      }

      .run-line {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 0;
        border-top: 1px solid var(--line);
      }

      .run-line:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .run-line .name {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .run-line .strong {
        font-weight: 700;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 12px;
        border-top: 1px solid var(--line);
        text-align: left;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .muted {
        color: var(--muted);
      }

      .pill {
        display: inline-flex;
        border-radius: 999px;
        padding: 6px 10px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
      }

      .loading,
      .error {
        padding: 24px;
        text-align: center;
        color: var(--muted);
      }

      .error {
        color: var(--warn);
      }

      @media (max-width: 980px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .card,
        .wide {
          grid-column: span 12;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div id="app" class="loading">Загрузка обзора...</div>
    </div>

    <script>
      const appNode = document.getElementById("app");
      const overviewUrl = "/monitoring/overview";

      function formatDate(value) {
        if (!value) {
          return "Нет данных";
        }
        return new Date(value).toLocaleString();
      }

      function formatPercent(value) {
        if (value === null || value === undefined) {
          return "Нет данных";
        }
        return `${(Number(value) * 100).toFixed(1)}%`;
      }

      function buildLinks() {
        const { protocol, hostname } = window.location;
        const grafanaBase = `${protocol}//${hostname}:3000`;
        return {
          docs: `${protocol}//${hostname}:8000/docs`,
          metrics: `${protocol}//${hostname}:8000/metrics`,
          grafana: grafanaBase,
          grafanaOverview: `${grafanaBase}/d/ml-monitoring-overview`,
          grafanaDrift: `${grafanaBase}/d/ml-monitoring-drift`,
          grafanaQuality: `${grafanaBase}/d/ml-monitoring-quality`,
          grafanaProxy: `${grafanaBase}/d/ml-monitoring-proxy`,
          grafanaSegments: `${grafanaBase}/d/ml-monitoring-segments`,
          prometheus: `${protocol}//${hostname}:9090`,
          alertmanager: `${protocol}//${hostname}:9093`
        };
      }

      function renderRun(run, type) {
        if (!run) {
          return `
            <div class="run-box">
              <div class="muted">Запуск ${type} еще не записан.</div>
            </div>
          `;
        }

        const details = type === "drift"
          ? [
              ["Статус", run.status],
              ["Старт", formatDate(run.ts_started)],
              ["Завершение", formatDate(run.ts_finished)],
              ["Размер окна", run.window_size],
              ["Severity", run.summary?.severity || "none"],
              ["Дрейф найден", run.overall_drift ? "Да" : "Нет"],
              ["Признаков с дрейфом", run.drifted_features_count],
              ["Сегмент", run.segment_key || "(нет)"]
            ]
          : [
              ["Статус", run.status],
              ["Старт", formatDate(run.ts_started)],
              ["Завершение", formatDate(run.ts_finished)],
              ["Размер окна", run.window_size],
              ["Режим", run.summary?.evaluation_mode || "labeled"],
              ["Severity", run.summary?.severity || "none"],
              ["Деградировавших метрик", run.degraded_metrics_count],
              ["Строк с метками", run.labeled_rows],
              ["Сегмент", run.segment_key || "(нет)"]
            ];

        return `
          <div class="run-box">
            ${details
              .map(
                ([label, value]) => `
                  <div class="run-line">
                    <div class="name">${label}</div>
                    <div class="strong">${value}</div>
                  </div>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderIncidents(incidents) {
        if (!incidents.length) {
          return '<div class="muted">Активных инцидентов нет. Мониторинг спокоен.</div>';
        }

        return `
          <table>
            <thead>
              <tr>
                <th>Severity</th>
                <th>Источник</th>
                <th>Сегмент</th>
                <th>Название</th>
                <th>Рекомендуемое действие</th>
              </tr>
            </thead>
            <tbody>
              ${incidents
                .map(
                  (incident) => `
                    <tr>
                      <td><span class="pill">${incident.severity}</span></td>
                      <td>${incident.source_type}</td>
                      <td>${incident.segment_key || "(нет)"}</td>
                      <td>${incident.title}</td>
                      <td>${incident.recommended_action}</td>
                    </tr>
                  `
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function renderSegments(segments) {
        if (!segments.length) {
          return '<div class="muted">Активность по сегментам пока не записана.</div>';
        }

        return `
          <table>
            <thead>
              <tr>
                <th>Сегмент</th>
                <th>Строк инференса</th>
                <th>Строк с метками</th>
                <th>Покрытие</th>
              </tr>
            </thead>
            <tbody>
              ${segments
                .map(
                  (segment) => `
                    <tr>
                      <td><span class="pill">${segment.segment_key}</span></td>
                      <td>${segment.inference_rows}</td>
                      <td>${segment.labeled_rows}</td>
                      <td>${formatPercent(segment.labeled_coverage)}</td>
                    </tr>
                  `
                )
                .join("")}
            </tbody>
          </table>
        `;
      }

      function renderOverview(data) {
        const links = buildLinks();
        const attention = data.service_status === "attention";
        const statusLabel = attention ? data.severity.toUpperCase() : "НОРМА";

        appNode.className = "";
        appNode.innerHTML = `
          <section class="hero">
            <article class="panel hero-card">
              <p class="eyebrow">Операторский слой</p>
              <h1>Обзор мониторинга ${data.model_version}</h1>
              <p class="subtitle">
                Одна страница для здоровья модели, свежести данных, дрейфа, качества и самых активных сегментов.
                Данные берутся из того же API и PostgreSQL-состояния, что используют задачи мониторинга.
              </p>
              <div class="links">
                <a href="${links.docs}" target="_blank" rel="noreferrer">Документация API</a>
                <a href="${links.metrics}" target="_blank" rel="noreferrer">Метрики</a>
                <a href="${links.grafana}" target="_blank" rel="noreferrer">Grafana</a>
                <a href="${links.grafanaOverview}" target="_blank" rel="noreferrer">Общий дашборд</a>
                <a href="${links.grafanaDrift}" target="_blank" rel="noreferrer">Дрейф</a>
                <a href="${links.grafanaQuality}" target="_blank" rel="noreferrer">Качество</a>
                <a href="${links.grafanaProxy}" target="_blank" rel="noreferrer">Прокси-сигналы</a>
                <a href="${links.grafanaSegments}" target="_blank" rel="noreferrer">Сегменты</a>
                <a href="${links.prometheus}" target="_blank" rel="noreferrer">Prometheus</a>
                <a href="${links.alertmanager}" target="_blank" rel="noreferrer">Alertmanager</a>
              </div>
            </article>
            <aside class="hero-meta">
              <div class="panel hero-card">
                <div class="status-badge">
                  <span class="status-dot ${attention ? "attention" : ""}"></span>
                  <span>${statusLabel}</span>
                </div>
                <div class="mini-list" style="margin-top: 18px;">
                  <div class="mini-item">
                    <span class="label">Сформировано</span>
                    <span class="value" style="font-size: 18px;">${formatDate(data.generated_at)}</span>
                  </div>
                  <div class="mini-item">
                    <span class="label">Версия модели</span>
                    <span class="value" style="font-size: 22px;">${data.model_version}</span>
                  </div>
                  <div class="mini-item">
                    <span class="label">Статус API</span>
                    <span class="value" style="font-size: 22px;">${data.api_health.status}</span>
                  </div>
                  <div class="mini-item">
                    <span class="label">Активные инциденты</span>
                    <span class="value" style="font-size: 22px;">${data.active_incidents_count}</span>
                  </div>
                </div>
              </div>
            </aside>
          </section>

          <section class="grid">
            <article class="panel card">
              <div class="label">Всего предсказаний</div>
              <div class="value">${data.data_snapshot.total_predictions}</div>
              <div class="hint">За 24 часа: ${data.data_snapshot.predictions_last_24h}</div>
            </article>
            <article class="panel card">
              <div class="label">Всего меток</div>
              <div class="value">${data.data_snapshot.total_labels}</div>
              <div class="hint">За 24 часа: ${data.data_snapshot.labels_last_24h}</div>
            </article>
            <article class="panel card">
              <div class="label">Покрытие метками</div>
              <div class="value">${formatPercent(data.data_snapshot.labeled_coverage)}</div>
              <div class="hint">По всем записанным строкам инференса</div>
            </article>
            <article class="panel card">
              <div class="label">Доля positive</div>
              <div class="value" style="font-size: 22px;">${formatPercent(data.data_snapshot.positive_prediction_rate)}</div>
              <div class="hint">Метки: ${formatPercent(data.data_snapshot.positive_label_rate)}</div>
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Рекомендуемое действие</h2>
                <span>Текущая подсказка оператору</span>
              </div>
              <div class="run-box">
                <div class="strong">${data.recommended_action || "Действие не требуется."}</div>
              </div>
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Последний запуск дрейфа</h2>
                <span>${data.latest_drift_run ? `Запуск #${data.latest_drift_run.id}` : "Запусков пока нет"}</span>
              </div>
              ${renderRun(data.latest_drift_run, "drift")}
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Последний запуск качества</h2>
                <span>${data.latest_quality_run ? `Запуск #${data.latest_quality_run.id}` : "Запусков пока нет"}</span>
              </div>
              ${renderRun(data.latest_quality_run, "quality")}
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Активные инциденты</h2>
                <span>Открытые сигналы мониторинга с действиями</span>
              </div>
              ${renderIncidents(data.active_incidents)}
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Топ сегментов</h2>
                <span>Отсортировано по объему инференса</span>
              </div>
              ${renderSegments(data.top_segments)}
            </article>

            <article class="panel wide">
              <div class="section-title">
                <h2>Свежесть</h2>
                <span>Последние timestamps активности</span>
              </div>
              <div class="run-box">
                <div class="run-line">
                  <div class="name">Последний инференс</div>
                  <div class="strong">${formatDate(data.data_snapshot.latest_inference_ts)}</div>
                </div>
                <div class="run-line">
                  <div class="name">Последняя метка</div>
                  <div class="strong">${formatDate(data.data_snapshot.latest_label_ts)}</div>
                </div>
              </div>
            </article>
          </section>
        `;
      }

      async function loadOverview() {
        try {
          const response = await fetch(overviewUrl, { headers: { Accept: "application/json" } });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          renderOverview(data);
        } catch (error) {
          appNode.className = "error";
          appNode.textContent = `Не удалось загрузить обзор: ${error}`;
        }
      }

      loadOverview();
      setInterval(loadOverview, 15000);
    </script>
  </body>
</html>
