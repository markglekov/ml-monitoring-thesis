services:
  postgres:
    image: postgres:16
    container_name: ml-monitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-monitoring-api:latest
    container_name: ml-monitoring-api
    restart: unless-stopped
    working_dir: /app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MODEL_PATH: ${MODEL_PATH}
      BASELINE_PATH: ${BASELINE_PATH}
      MODEL_VERSION: ${MODEL_VERSION}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - ./:/app
    ports:
      - "${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-monitoring-api:latest
    container_name: ml-monitoring-scheduler
    restart: unless-stopped
    working_dir: /app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MODEL_PATH: ${MODEL_PATH}
      BASELINE_PATH: ${BASELINE_PATH}
      MODEL_VERSION: ${MODEL_VERSION}
      MONITORING_SEGMENTS: ${MONITORING_SEGMENTS:-}
      SCHEDULER_INCLUDE_GLOBAL_SEGMENT: ${SCHEDULER_INCLUDE_GLOBAL_SEGMENT:-true}
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
    command:
      [
        "python",
        "-m",
        "app.monitoring.scheduler",
        "--drift-interval-sec",
        "${SCHEDULER_DRIFT_INTERVAL_SEC:-300}",
        "--quality-interval-sec",
        "${SCHEDULER_QUALITY_INTERVAL_SEC:-300}",
        "--drift-window-size",
        "${SCHEDULER_DRIFT_WINDOW_SIZE:-300}",
        "--quality-window-size",
        "${SCHEDULER_QUALITY_WINDOW_SIZE:-300}",
        "--drift-min-rows",
        "${SCHEDULER_DRIFT_MIN_ROWS:-50}",
        "--quality-min-rows",
        "${SCHEDULER_QUALITY_MIN_ROWS:-50}",
        "--quality-baseline-source",
        "${SCHEDULER_QUALITY_BASELINE_SOURCE:-test}",
      ]

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: ml-monitoring-prometheus
    restart: unless-stopped
    command:
      [
        "--config.file=/etc/prometheus/prometheus.yml",
        "--storage.tsdb.path=/prometheus",
        "--web.enable-lifecycle",
      ]
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.30.0
    container_name: ml-monitoring-alertmanager
    restart: unless-stopped
    command:
      [
        "--config.file=/etc/alertmanager/alertmanager.yml",
        "--storage.path=/alertmanager",
      ]
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    depends_on:
      email-relay:
        condition: service_started

  mailpit:
    image: axllent/mailpit:v1.28.2
    container_name: ml-monitoring-mailpit
    restart: unless-stopped
    profiles: ["mailpit"]
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  email-relay:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-monitoring-api:latest
    container_name: ml-monitoring-email-relay
    restart: unless-stopped
    working_dir: /app
    environment:
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      SMTP_TIMEOUT_SEC: ${SMTP_TIMEOUT_SEC:-15}
    volumes:
      - ./:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["uvicorn", "app.notifications.email_relay:app", "--host", "0.0.0.0", "--port", "8081"]

  grafana:
    image: grafana/grafana:12.3.1
    container_name: ml-monitoring-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
