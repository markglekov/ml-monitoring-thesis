global:
  resolve_timeout: 5m

route:
  receiver: email-relay
  group_by:
    - alertname
    - severity
    - service
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: dev-null
  - name: email-relay
    webhook_configs:
      - url: http://email-relay:8081/alertmanager/webhook
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service
