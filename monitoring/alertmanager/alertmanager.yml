global:
  resolve_timeout: 5m

route:
  receiver: dev-null
  group_by:
    - alertname
    - severity
    - service
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: dev-null

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service
