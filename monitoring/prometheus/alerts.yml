groups:
  - name: ml-monitoring-api
    rules:
      - alert: MlMonitoringApiDown
        expr: up{job="ml-monitoring-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: ML мониторинг API недоступен
          description: Prometheus не может получить метрики с эндпоинта API мониторинга ML более 1 минуты.

      - alert: MlMonitoringPredict5xxRateHigh
        expr: |
          (
            sum(rate(ml_monitoring_http_requests_total{job="ml-monitoring-api", path="/predict", status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(ml_monitoring_http_requests_total{job="ml-monitoring-api", path="/predict"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: Высокий процент ошибок 5xx на эндпоинте /predict
          description: Эндпоинт /predict возвращает более 5% ответов с кодом 5xx за последние 5 минут.

      - alert: MlMonitoringPredictLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(ml_monitoring_http_request_duration_seconds_bucket{job="ml-monitoring-api", path="/predict"}[5m])
            )
          ) > 0.25
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: Высокая задержка на эндпоинте /predict
          description: P95 задержка для /predict превышает 250мс в течение 10 минут.

  - name: ml-monitoring-jobs
    rules:
      - alert: MlMonitoringDriftRiskWarning
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="drift", severity="warning"}) > 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Мониторинг дрейфа выявил предупреждение
          description: Сигналы дрейфа сохранялись достаточно долго, чтобы открыть инцидент уровня предупреждения. Проверьте недавние окна, сегменты и подтвердите, продолжается ли сдвиг.
          action: Проверьте детали дрейфа в overview API или Grafana, затем решите, требуется ли сбор меток или смягчение последствий.
          runbook_url: http://localhost:8000/monitoring/overview

      - alert: MlMonitoringDriftRiskCritical
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="drift", severity="critical"}) > 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Мониторинг дрейфа выявил критический инцидент
          description: Критический уровень дрейфа. Немедленно проверьте изменения входных данных и подготовьте откат или переобучение модели.
          action: Эскалируйте владельцу модели и проверьте временную шкалу инцидента перед продолжением автоматизированных решений.
          runbook_url: http://localhost:8000/monitoring/incidents

      - alert: MlMonitoringQualityRiskWarning
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="quality", severity="warning"}) > 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Мониторинг качества выявил предупреждение
          description: Обнаружено ухудшение качества меток или прокси-риск. Соберите метки, проверьте дрейф оценок и подтвердите следующие окна.
          action: Проверьте рекомендуемое действие в overview API перед изменением модели или порога.
          runbook_url: http://localhost:8000/monitoring/overview

      - alert: MlMonitoringQualityRiskCritical
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="quality", severity="critical"}) > 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Мониторинг качества выявил критический инцидент
          description: Критическое ухудшение качества. Немедленно исследуйте метки, калибровку, пороги и варианты смягчения.
          action: Эскалируйте владельцу модели и подготовьте откат, перекалибровку или переобучение.
          runbook_url: http://localhost:8000/monitoring/incidents

      - alert: MlMonitoringDriftJobFailed
        expr: max(ml_monitoring_drift_last_run_status{job="ml-monitoring-api", status="failed"}) > 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Задача мониторинга дрейфа завершилась с ошибкой
          description: Последний запуск мониторинга дрейфа завершился со статусом failed.

      - alert: MlMonitoringQualityJobFailed
        expr: max(ml_monitoring_quality_last_run_status{job="ml-monitoring-api", status="failed"}) > 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Задача мониторинга качества завершилась с ошибкой
          description: Последний запуск мониторинга качества завершился со статусом failed.

      - alert: MlMonitoringDriftJobStale
        expr: max(ml_monitoring_drift_last_run_age_seconds{job="ml-monitoring-api"}) > 900
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Задача мониторинга дрейфа устарела
          description: Завершённый запуск мониторинга дрейфа не обновлял метрики более 15 минут.

      - alert: MlMonitoringQualityJobStale
        expr: max(ml_monitoring_quality_last_run_age_seconds{job="ml-monitoring-api"}) > 900
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Задача мониторинга качества устарела
          description: Завершённый запуск мониторинга качества не обновлял метрики более 15 минут.
