groups:
  - name: ml-monitoring-api
    rules:
      - alert: MlMonitoringApiDown
        expr: up{job="ml-monitoring-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: ML monitoring API is down
          description: Prometheus cannot scrape the inference API metrics endpoint for more than 1 minute.

      - alert: MlMonitoringPredict5xxRateHigh
        expr: |
          (
            sum(rate(ml_monitoring_http_requests_total{job="ml-monitoring-api", path="/predict", status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(ml_monitoring_http_requests_total{job="ml-monitoring-api", path="/predict"}[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: Predict endpoint 5xx rate is high
          description: The /predict endpoint is returning more than 5% 5xx responses over the last 5 minutes.

      - alert: MlMonitoringPredictLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (
              rate(ml_monitoring_http_request_duration_seconds_bucket{job="ml-monitoring-api", path="/predict"}[5m])
            )
          ) > 0.25
        for: 10m
        labels:
          severity: warning
          service: api
        annotations:
          summary: Predict endpoint latency is high
          description: The p95 latency for /predict has been above 250ms for 10 minutes.

  - name: ml-monitoring-jobs
    rules:
      - alert: MlMonitoringDriftRiskWarning
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="drift", severity="warning"}) > 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Drift monitoring raised a warning incident
          description: Drift signals persisted long enough to open a warning-level incident. Review recent windows, inspect segments, and confirm whether the shift continues.
          action: Inspect drift details in the overview API or Grafana, then decide whether label collection or mitigation is required.
          runbook_url: http://localhost:8000/monitoring/overview

      - alert: MlMonitoringDriftRiskCritical
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="drift", severity="critical"}) > 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Drift monitoring raised a critical incident
          description: Drift severity is critical. Review upstream data changes immediately and prepare fallback, rollback, or retraining actions.
          action: Escalate to the model owner and inspect the incident timeline before automated decisions continue.
          runbook_url: http://localhost:8000/monitoring/incidents

      - alert: MlMonitoringQualityRiskWarning
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="quality", severity="warning"}) > 0
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Quality monitoring raised a warning incident
          description: Labeled degradation or proxy risk was detected and stayed active. Collect labels, inspect score drift, and confirm the next windows.
          action: Review the recommended action in the overview API before changing the model or threshold.
          runbook_url: http://localhost:8000/monitoring/overview

      - alert: MlMonitoringQualityRiskCritical
        expr: sum(ml_monitoring_active_incidents{job="ml-monitoring-api", source_type="quality", severity="critical"}) > 0
        for: 2m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Quality monitoring raised a critical incident
          description: Quality degradation is critical. Investigate labels, calibration, thresholding, and mitigation options immediately.
          action: Escalate to the model owner and prepare rollback, recalibration, or retraining.
          runbook_url: http://localhost:8000/monitoring/incidents

      - alert: MlMonitoringDriftJobFailed
        expr: max(ml_monitoring_drift_last_run_status{job="ml-monitoring-api", status="failed"}) > 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Drift monitoring job failed
          description: The latest drift monitoring run ended with failed status.

      - alert: MlMonitoringQualityJobFailed
        expr: max(ml_monitoring_quality_last_run_status{job="ml-monitoring-api", status="failed"}) > 0
        for: 1m
        labels:
          severity: critical
          service: monitoring
        annotations:
          summary: Quality monitoring job failed
          description: The latest quality monitoring run ended with failed status.

      - alert: MlMonitoringDriftJobStale
        expr: max(ml_monitoring_drift_last_run_age_seconds{job="ml-monitoring-api"}) > 900
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Drift monitoring job is stale
          description: No completed drift monitoring run has updated metrics for more than 15 minutes.

      - alert: MlMonitoringQualityJobStale
        expr: max(ml_monitoring_quality_last_run_age_seconds{job="ml-monitoring-api"}) > 900
        for: 5m
        labels:
          severity: warning
          service: monitoring
        annotations:
          summary: Quality monitoring job is stale
          description: No completed quality monitoring run has updated metrics for more than 15 minutes.
