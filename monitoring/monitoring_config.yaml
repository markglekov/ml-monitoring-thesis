# Операторские дефолты мониторинга.
#
# Приоритет переопределений:
# 1. CLI-аргументы ручных запусков и scheduler.
# 2. Env-переменные Docker Compose для scheduler/reaction.
# 3. Этот файл как воспроизводимый baseline конфигурации.

scheduler:
  poll_interval_sec: 5.0
  drift_interval_sec: 300.0
  quality_interval_sec: 300.0

drift:
  window_size: 300
  min_rows: 50
  univariate:
    pvalue_warning: 0.05
    pvalue_critical: 0.01
    psi_warning: 0.20
    psi_critical: 0.35
  domain_classifier:
    auc_warning: 0.65
    auc_critical: 0.75
    pvalue_max: 0.05
    permutations: 31
  advanced_detectors:
    mmd:
      warning: 0.05
      critical: 0.10
      permutations: 31
    wasserstein:
      warning: 0.10
      critical: 0.20
    cusum:
      warning: 5.0
      critical: 8.0
    ewma:
      warning: 3.0
      critical: 5.0
    adwin:
      delta: 0.20
      warning: 0.10
      critical: 0.20
    ddm:
      warning: 0.15
      critical: 0.40
    eddm:
      warning: 0.20
      critical: 0.40

quality:
  window_size: 300
  min_rows: 50
  baseline_source: test
  critical_multiplier: 2.0
  proxy_threshold_band: 0.10
  degradation_rules:
    roc_auc:
      mode: min_delta
      threshold: 0.03
      detector_name: labeled
    pr_auc:
      mode: min_delta
      threshold: 0.04
      detector_name: labeled
    precision:
      mode: min_delta
      threshold: 0.04
      detector_name: labeled
    recall:
      mode: min_delta
      threshold: 0.03
      detector_name: labeled
    f1:
      mode: min_delta
      threshold: 0.04
      detector_name: labeled
    brier_score:
      mode: max_delta
      threshold: 0.02
      detector_name: labeled
    ece:
      mode: max_delta
      threshold: 0.03
      detector_name: calibration
    positive_rate_pred:
      mode: abs_delta
      threshold: 0.08
      detector_name: proxy
    positive_rate_true:
      mode: abs_delta
      threshold: 0.05
      detector_name: labeled
    score_mean:
      mode: abs_delta
      threshold: 0.08
      detector_name: proxy
    score_std:
      mode: abs_delta
      threshold: 0.06
      detector_name: proxy
    score_entropy:
      mode: max_delta
      threshold: 0.05
      detector_name: proxy
    near_threshold_rate:
      mode: abs_delta
      threshold: 0.10
      detector_name: proxy
    score_psi:
      mode: max_absolute
      threshold: 0.20
      detector_name: proxy

reaction:
  engine_enabled: true
  mode: dry_run
  threshold_step: 0.05
  threshold_cap: 0.95
  manual_review_probability: 1.0
  action_policy:
    drift:
      critical: manual_review
      warning: observe
    quality:
      critical: tighten_threshold
      warning: collect_labels
    proxy:
      critical: collect_labels
      warning: collect_labels
